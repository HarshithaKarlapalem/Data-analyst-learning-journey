<!DOCTYPE html>
<html>
<head>
  <title>Fridge Hero 🍳</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 350px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      width: 100%;
      outline: none;
    }

    button {
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #f3f3f3;
    }

    #result {
      margin-top: 20px;
      background: rgba(255,255,255,0.9);
      color: black;
      padding: 20px;
      border-radius: 15px;
      text-align: left;
      animation: fadeIn 0.5s ease-in-out;
    }

    .loader {
      margin: 15px auto;
      border: 4px solid #fff;
      border-top: 4px solid #000;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Fridge Hero 🍳</h1>

  <input id="i1" placeholder="Ingredient 1">
  <input id="i2" placeholder="Ingredient 2">
  <input id="i3" placeholder="Ingredient 3">

  <button onclick="cook()" id="btn">Cook Magic ✨</button>

  <div id="result"></div>
</div>

<script>
async function cook() {
  const btn = document.getElementById("btn");
  const resultDiv = document.getElementById("result");

  const i1 = document.getElementById("i1").value;
  const i2 = document.getElementById("i2").value;
  const i3 = document.getElementById("i3").value;

  if (!i1 || !i2 || !i3) {
    resultDiv.innerText = "Please enter all 3 ingredients 😊";
    return;
  }

  btn.innerText = "Loading...";
  resultDiv.innerHTML = `<div class="loader"></div>`;

  setTimeout(() => {
    const result = `
🍽️ Dish: ${i1} Delight with ${i2} & ${i3}

👩‍🍳 Steps:
1. Chop ${i1}, ${i2}, and ${i3}.
2. Cook them together with spices.
3. Serve hot and enjoy!
    `;

    resultDiv.innerText = result;
    btn.innerText = "Cook Magic ✨";
  }, 1500);
}
</script>

</body>
</html>
